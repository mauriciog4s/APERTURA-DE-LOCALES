<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<script>
    (function() {
        const isEditMode = window.location.href.includes('/edit/') || window.location.href.includes('/builder');
        const style = document.createElement('style');
        if (!isEditMode) {
            style.innerHTML = `
                nav.navbar, #saltcorn-navbar, footer.page-footer, .card-header { display: none !important; }
                html, body { margin: 0 !important; padding: 0 !important; width: 100% !important; height: 100% !important; background-color: #f8fafc !important; overflow: hidden !important; }
                .container, .container-fluid, #page-inner-content { padding: 0 !important; margin: 0 !important; max-width: 100% !important; width: 100% !important; height: 100% !important; }
                #g4s-app-root { position: fixed !important; inset: 0 !important; width: 100% !important; height: 100dvh !important; min-height: 100% !important; z-index: 50; }
            `;
        } else {
            style.innerHTML = `
                #g4s-app-root { position: relative !important; width: 100%; height: 700px; border: 4px dashed #cbd5e1; border-radius: 8px; margin: 20px 0; overflow: hidden; background-color: #f8fafc; z-index: 1; }
                #bottom-nav, .fab-group { position: absolute !important; }
            `;
        }
        document.head.appendChild(style);
    })();
</script>

<style>
    #g4s-app-root { --g4s-red: #c1272d; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; overflow: hidden; }
    .app-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
    #scrollable-content { flex: 1; overflow-y: auto; padding-bottom: 100px; background-color: #f8fafc; }
    #sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; flex-shrink: 0; z-index: 50; }
    #bottom-nav { display: flex; position: absolute; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e2e8f0; justify-content: space-around; padding-top: 10px; padding-bottom: max(15px, env(safe-area-inset-bottom)); z-index: 9999; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); }
    .bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 600; cursor: pointer; }
    .bottom-nav-item.active { color: var(--g4s-red); }
    .nav-item { padding: 12px 24px; display: flex; align-items: center; color: #64748b; cursor: pointer; font-size: 14px; }
    .nav-item.active { background: #fff1f2; color: var(--g4s-red); font-weight: 600; border-left: 4px solid var(--g4s-red); }
    .btn-g4s { background: linear-gradient(135deg, #c1272d 0%, #a01f24 100%); color: white; border-radius: 8px; font-weight: 600; padding: 12px; transition: all 0.3s; }
    .g4s-table { width: 100%; border-collapse: collapse; background: white; }
    .g4s-table th { background: #f8fafc; color: #475569; font-size: 11px; padding: 12px; text-align: left; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; }
    .g4s-table td { padding: 12px; font-size: 13px; border-bottom: 1px solid #f1f5f9; }
</style>

<div id="g4s-app-root">
    <header class="bg-white border-b px-4 py-3 flex justify-between items-center z-40 md:hidden">
        <div class="flex items-center gap-2">
            <span class="material-icons text-red-600">local_shipping</span>
            <span class="font-bold text-slate-800">Control Operativo</span>
        </div>
        <button onclick="recargarDatos()" class="p-2 text-gray-400"><span class="material-icons">refresh</span></button>
    </header>

    <div class="app-layout">
        <aside id="sidebar" class="hidden md:flex">
            <div class="p-6 border-b"><h1 class="text-xl font-black text-slate-800 uppercase">G4S Patio</h1></div>
            <nav class="mt-4 flex-1">
                <div onclick="navegar('inicio', this)" class="nav-item active" data-target="inicio"><span class="material-icons mr-3">view_list</span> Activos</div>
                <div onclick="prepararNuevoIngreso(this)" class="nav-item" data-target="nuevo"><span class="material-icons mr-3">add_circle</span> Nuevo</div>
                <div onclick="navegar('historico', this)" class="nav-item" data-target="historico"><span class="material-icons mr-3">history</span> Historial</div>
            </nav>
        </aside>

        <main id="main-content" class="flex-1 flex flex-col relative overflow-hidden">
            <div id="scrollable-content" class="p-4 md:p-8">
                
                <section id="sec-inicio">
                    <h2 class="text-xl font-bold mb-4">Registros en Sitio</h2>
                    <div class="overflow-x-auto rounded-xl border">
                        <table class="g4s-table">
                            <thead><tr><th>Acciones</th><th>Estado</th><th>Placa</th><th>Conductor</th></tr></thead>
                            <tbody id="tabla-body"></tbody>
                        </table>
                    </div>
                </section>

                <section id="sec-historico" class="hidden">
                    <h2 class="text-xl font-bold mb-4">Historial de Movimientos</h2>
                    <div class="overflow-x-auto rounded-xl border">
                        <table class="g4s-table">
                            <thead><tr><th>Acciones</th><th>Fecha</th><th>Estado</th><th>Placa</th><th>GPS</th></tr></thead>
                            <tbody id="tabla-historico-body"></tbody>
                        </table>
                    </div>
                </section>

                <section id="sec-nuevo" class="hidden">
                    <div class="max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow-sm border">
                        <h2 id="form-title" class="text-xl font-bold mb-6 border-b pb-2">Nuevo Ingreso</h2>
                        <form id="form-ingreso" onsubmit="enviarFormulario(event)" class="space-y-4">
                            <input type="hidden" id="f-gps" value="Obteniendo...">

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="text-xs font-bold text-gray-400 uppercase">Placa *</label>
                                    <input type="text" id="Placa" required class="w-full p-3 bg-gray-50 border rounded-lg uppercase">
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-gray-400 uppercase">Conductor *</label>
                                    <input type="text" id="Nombres_Conductor" required class="w-full p-3 bg-gray-50 border rounded-lg uppercase">
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-gray-400 uppercase">Cédula *</label>
                                    <input type="number" id="Documento_Conductor" required class="w-full p-3 bg-gray-50 border rounded-lg">
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-gray-400 uppercase">Estado</label>
                                    <select id="Estado" class="w-full p-3 bg-gray-50 border rounded-lg font-bold text-red-600">
                                        <option value="INGRESO">INGRESO</option>
                                        <option value="SALIDA">SALIDA</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-2 mt-4">
                                <label class="border-2 border-dashed p-4 rounded-xl flex flex-col items-center cursor-pointer" id="lbl-adelante">
                                    <span class="material-icons text-gray-400">photo_camera</span>
                                    <span class="text-[10px] uppercase font-bold text-gray-400">Foto Adelante</span>
                                    <input type="file" accept="image/*" capture="environment" class="hidden" onchange="validarFoto(this, 'lbl-adelante')">
                                </label>
                                <label class="border-2 border-dashed p-4 rounded-xl flex flex-col items-center cursor-pointer" id="lbl-atras">
                                    <span class="material-icons text-gray-400">photo_camera</span>
                                    <span class="text-[10px] uppercase font-bold text-gray-400">Foto Atrás</span>
                                    <input type="file" accept="image/*" capture="environment" class="hidden" onchange="validarFoto(this, 'lbl-atras')">
                                </label>
                            </div>

                            <button type="submit" class="w-full btn-g4s mt-6 flex justify-center items-center gap-2">
                                <span class="material-icons">save</span> GUARDAR REGISTRO
                            </button>
                        </form>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <nav id="bottom-nav" class="md:hidden">
        <div onclick="navegar('inicio', this)" class="bottom-nav-item active" data-target="inicio"><span class="material-icons">view_list</span><span>Activos</span></div>
        <div onclick="prepararNuevoIngreso(this)" class="bottom-nav-item" data-target="nuevo"><span class="material-icons">add_circle</span><span>Nuevo</span></div>
        <div onclick="navegar('historico', this)" class="bottom-nav-item" data-target="historico"><span class="material-icons">history</span><span>Historial</span></div>
    </nav>
</div>

<script>
    const API_ROUTE = '/api/tb004_001_Gestión_de_Patio_y_Stock';
    let registrosData = [];

    // ================= LÓGICA DE GPS REFORZADA =================
    function capturarUbicacion() {
        if (!navigator.geolocation) {
            document.getElementById('f-gps').value = "No soportado";
            return;
        }
        
        const opciones = { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 };
        
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const coords = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
                document.getElementById('f-gps').value = coords;
                console.log("GPS Capturado:", coords);
            },
            (err) => {
                console.warn("Error GPS:", err.message);
                // Si falla, intentamos de nuevo con menos precisión para obtener algo
                navigator.geolocation.getCurrentPosition(pos => {
                    document.getElementById('f-gps').value = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
                }, null, {enableHighAccuracy: false});
            }, 
            opciones
        );
    }

    // Iniciar captura desde que carga la página
    window.onload = () => {
        capturarUbicacion();
        cargarDatosAPI();
        // Re-capturar cada 30 segundos para mantenerlo fresco
        setInterval(capturarUbicacion, 30000);
    };

    async function cargarDatosAPI() {
        try {
            const res = await fetch(API_ROUTE);
            const data = await res.json();
            registrosData = data.success || data || [];
            renderizarTablas();
        } catch (e) { console.error("Error cargando datos"); }
    }

    function renderizarTablas() {
        const body = document.getElementById('tabla-body');
        const hist = document.getElementById('tabla-historico-body');
        body.innerHTML = ''; hist.innerHTML = '';

        registrosData.forEach(r => {
            const tr = `<tr>
                <td><button onclick="verDetalle('${r.id}')" class="text-blue-600"><span class="material-icons">visibility</span></button></td>
                <td><span class="px-2 py-1 rounded bg-green-100 text-green-700 text-xs font-bold">${r.estado}</span></td>
                <td class="font-bold">${r.placa || '---'}</td>
                <td>${r.nombre_conductor || '---'}</td>
            </tr>`;
            
            if(r.estado === 'INGRESO' || r.estado === 'ACTIVO') body.innerHTML += tr;

            // Historial con extracción de GPS
            const latlng = r.gps || r.ubicacion || r.coordenadas || "Sin registro";
            hist.innerHTML += `<tr>
                <td><button onclick="verDetalle('${r.id}')"><span class="material-icons text-gray-400">assignment</span></button></td>
                <td class="text-xs text-gray-500">${new Date(r.datetime).toLocaleString()}</td>
                <td class="text-[10px] font-bold">${r.estado}</td>
                <td class="font-bold">${r.placa}</td>
                <td class="text-blue-600 font-mono text-[11px]">${latlng}</td>
            </tr>`;
        });
    }

    function navegar(vista, el) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + vista).classList.remove('hidden');
        document.querySelectorAll('.nav-item, .bottom-nav-item').forEach(i => i.classList.remove('active'));
        if(el) el.classList.add('active');
        if(vista === 'nuevo') capturarUbicacion(); // Refrescar GPS al entrar a formulario
    }

    function prepararNuevoIngreso(el) {
        document.getElementById('form-ingreso').reset();
        document.getElementById('form-title').innerText = "Nuevo Ingreso";
        document.getElementById('Estado').value = "INGRESO";
        navegar('nuevo', el);
    }

    function validarFoto(input, lblId) {
        if(input.files.length > 0) {
            document.getElementById(lblId).classList.add('bg-green-50', 'border-green-500');
            document.getElementById(lblId).querySelector('.material-icons').classList.replace('text-gray-400', 'text-green-600');
        }
    }

    async function enviarFormulario(e) {
        e.preventDefault();
        
        // Si el GPS sigue diciendo "Obteniendo", intentamos captura flash
        if(document.getElementById('f-gps').value === "Obteniendo...") {
            capturarUbicacion();
            await new Promise(r => setTimeout(r, 1000)); // Esperar 1 seg a la antena
        }

        const payload = {
            placa: document.getElementById('Placa').value.toUpperCase(),
            nombre_conductor: document.getElementById('Nombres_Conductor').value.toUpperCase(),
            documento_conductor: document.getElementById('Documento_Conductor').value,
            estado: document.getElementById('Estado').value,
            datetime: new Date().toISOString(),
            // Enviamos la ubicación en múltiples campos para asegurar que Saltcorn lo atrape
            gps: document.getElementById('f-gps').value,
            ubicacion: document.getElementById('f-gps').value,
            coordenadas: document.getElementById('f-gps').value
        };

        try {
            const res = await fetch(API_ROUTE, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if(res.ok) {
                alert("Registro Guardado");
                cargarDatosAPI();
                navegar('inicio');
            }
        } catch (e) { alert("Error al guardar"); }
    }
</script>
